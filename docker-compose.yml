version: '3.8'

services:
  # Serviço do Banco de Dados
  postgres-db:
    image: postgres:latest
    container_name: garagefy-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: '@54329452'
      POSTGRES_DB: garagefy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql # <-- Ajustado aqui (sem o /data no final)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d garagefy"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - garagefy-network

  # Serviço da API em Go
  api:
    build: .
    container_name: garagefy-api-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres-db
      - DB_USER=postgres
      - DB_PASSWORD=@54329452
      - DB_NAME=garagefy
      - DB_PORT=5432
      - PORT=8080
      - SMTP_HOST=sandbox.smtp.mailtrap.io
      - SMTP_PORT=587
      - SMTP_USER=7c55a1a90087e3
      - SMTP_PASS=c73b681b4c01f2
      - SMTP_FROM=noreply@garagefy.com
      - RESET_PASSWORD_URL=http://localhost:8080/api/auth/reset-password
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - garagefy-network

volumes:
  postgres_data:

networks:
  garagefy-network:
    driver: bridge